services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: pandemic
      POSTGRES_PASSWORD: pandemic
      POSTGRES_DB: pandemic_pulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pandemic -d pandemic_pulse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
